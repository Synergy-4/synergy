name: synergy
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.4.0
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  google_fonts: ^8.0.2
  lottie: ^3.1.0
  just_audio: ^0.9.36
  flutter_secure_storage: ^10.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: any
  sqflite_common_ffi_web: any
  sqlite3_flutter_libs: any
  path: ^1.8.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  liquid_glass_renderer: ^0.2.0-dev.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.8
  freezed: ^3.2.5
  json_serializable: ^6.7.1

flutter_native_splash:
  color: "#F5F7FA"
  color_dark: "#1A1A1A"
  image: assets/logo.png
  image_dark: assets/logo.png
  fullscreen: true
  android_12:
    color: "#F5F7FA"
    color_dark: "#1A1A1A"
    image: assets/logo.png
    image_dark: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/backgrounds/
    - assets/logo.png
